<!DOCTYPE html>
<html>
<head>
<title>QVAC PrivacyVault</title>
<style>
body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #0a0a0a; color: #fff; }
h1 { color: #00ff88; }
.card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 5px; }
button { background: #00ff88; color: #000; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.result { background: #0a2a1a; padding: 15px; border-radius: 5px; margin-top: 10px; color: #00ff88; }
.privacy { color: #888; font-size: 12px; }
</style>
</head>
<body>
<h1>🔒 QVAC PrivacyVault</h1>
<p class="privacy">✅ 100% Local AI — Zero Cloud — Your data never leaves your device</p>

<div class="card">
  <h2>🌍 Local Translation</h2>
  <select id="model">
    <option value="hi_en">Hindi → English</option>
    <option value="en_hi">English → Hindi</option>
    <option value="fr_en">French → English</option>
    <option value="de_en">German → English</option>
    <option value="es_en">Spanish → English</option>
  </select>
  <textarea id="input" rows="4" placeholder="Enter text to translate..."></textarea>
  <button onclick="translate()">Translate Locally 🔒</button>
  <div class="result" id="result">Result will appear here...</div>
</div>

<div class="card">
  <h2>📊 Models Loaded</h2>
  <div id="models">Loading...</div>
</div>

<script>
const models = {
  hi_en: "BERGAMOT_HI_EN",
  en_hi: "BERGAMOT_EN_HI", 
  fr_en: "BERGAMOT_FR_EN",
  de_en: "BERGAMOT_DE_EN",
  es_en: "BERGAMOT_ES_EN"
};

document.getElementById('models').innerHTML = 
  Object.entries(models).map(function(e) {
    return '<p>✅ ' + e[0] + ': ' + e[1] + ' [Local]</p>';
  }).join('');

const langNames = { hi: "Hindi", en: "English", fr: "French", de: "German", es: "Spanish" };

async function translate() {
  const text = document.getElementById('input').value;
  const model = document.getElementById('model').value;
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '🔄 Translating locally with QVAC SDK (Bergamot NMT)...';

  try {
    const res = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, modelKey: model })
    });
    const data = await res.json();
    if (data.error) {
      resultDiv.innerHTML = '❌ Error: ' + data.error;
      return;
    }
    resultDiv.innerHTML =
      '✅ Translated: <b>' + data.translatedText + '</b><br>' +
      'Model: ' + models[model] + '<br>' +
      '🔒 ' + data.privacy +
      '<br><br><i>🧠 Loading on-device AI context analysis (Llama 3.2 1B)...</i>';

    const [fromKey, toKey] = model.split('_');
    const explainRes = await fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        originalText: text,
        translatedText: data.translatedText,
        fromLang: langNames[fromKey] || fromKey,
        toLang: langNames[toKey] || toKey,
      })
    });
    const explainData = await explainRes.json();

    resultDiv.innerHTML =
      '✅ Translated: <b>' + data.translatedText + '</b><br>' +
      'Model: ' + models[model] + '<br>' +
      '🔒 ' + data.privacy +
      '<br><br>🧠 <b>AI Context:</b> ' + (explainData.explanation || '(unavailable)') +
      '<br><span style="font-size:11px;color:#666">Pipeline: ' + (explainData.pipeline || '') +
      ' | ' + (explainData.performance?.tokensPerSecond?.toFixed(1) || '?') + ' tok/s on ' +
      (explainData.performance?.backendDevice || '?') + '</span>' +
      '<br><br><i>🤖 Checking for action items (Qwen3 tool-calling agent)...</i>';

    const agentRes = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ translatedText: data.translatedText })
    });
    const agentData = await agentRes.json();

    let agentHtml = '<br><br>🤖 <b>Agent:</b> ';
    if (agentData.actionCount > 0) {
      agentHtml += agentData.detectedActions.map(a =>
        '<span style="color:#0a0">⚡ ' + a.tool + '(' + JSON.stringify(a.arguments) + ')</span>'
      ).join('<br>');
    } else {
      agentHtml += 'No action items detected.';
    }
    agentHtml += '<br><span style="font-size:11px;color:#666">Model: ' + (agentData.modelUsed || '') +
      ' | ' + (agentData.performance?.tokensPerSecond?.toFixed(1) || '?') + ' tok/s</span>';

    resultDiv.innerHTML =
      '✅ Translated: <b>' + data.translatedText + '</b><br>' +
      'Model: ' + models[model] + '<br>' +
      '🔒 ' + data.privacy +
      '<br><br>🧠 <b>AI Context:</b> ' + (explainData.explanation || '(unavailable)') +
      '<br><span style="font-size:11px;color:#666">Pipeline: ' + (explainData.pipeline || '') +
      ' | ' + (explainData.performance?.tokensPerSecond?.toFixed(1) || '?') + ' tok/s on ' +
      (explainData.performance?.backendDevice || '?') + '</span>' +
      agentHtml;
  } catch (err) {
    resultDiv.innerHTML = '❌ Connection error: ' + err.message;
  }
}
</script>
</body>
</html>
